{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<style>
  /* 1. Tell the page to take up the full screen height */
  html {
    height: 100%;
  }
  
  /* 2. Turn the body into the 'anchor' and add padding at the bottom so text doesn't hide behind the footer */
  body {
    position: relative;
    min-height: 100vh;
    padding-bottom: 150px; 
  }
  
  /* 3. Lock the footer to the absolute bottom of that anchor */
  .page__footer {
    position: absolute !important;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
  }
</style>
